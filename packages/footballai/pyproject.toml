[project]
name = "footballai"
version = "0.1.0"
description = "FootballAI inference package: Roboflow sports player/pitch/ball/team detection."
requires-python = ">=3.12"
dependencies = [
    "opencv-python",
    "ultralytics",
    "numpy",
    "lap",
    "gdown",
    "tqdm",
    "torch",
    "torchvision",
    "transformers",
    "scikit-learn",
    "umap-learn",
    "scipy",
    "sports @ git+https://github.com/roboflow/sports.git",
    "websockets",
    "yt-dlp",
    "playwright",
]

[project.scripts]
inference = "footballai.cli:main"
inference-live-capture = "footballai.headless_capture:main"
web = "footballai.web_server:main"

[project.optional-dependencies]
dev = [
    "pytest",
    "ruff",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/footballai"]

[tool.hatch.metadata]
allow-direct-references = true

[tool.uv]
default-groups = []
